[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# Raise sync function timeout to 26s on Pro (background functions get 15 min by design)
[functions."*"]
  timeout = 26

# Do NOT pin @netlify/plugin-nextjs — let it auto-update for Next 16 fixes
[[plugins]]
  package = "@netlify/plugin-nextjs"
